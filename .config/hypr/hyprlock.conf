# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

# Color
source = ~/.config/omarchy/current/theme/hyprlock.conf

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ General Settings                                                          │
#  └───────────────────────────────────────────────────────────────────────────┘

general {
    ignore_empty_input = true
    hide_cursor = false
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Background                                                                │
#  └───────────────────────────────────────────────────────────────────────────┘

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Animation                                                                 │
#  └───────────────────────────────────────────────────────────────────────────┘

animations {
    enabled = false
    animation = fade,    1, 6, default
    animation = fadeIn,  1, 6, default
    animation = fadeOut, 1, 6, default
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Password Input Field                                                      │
#  └───────────────────────────────────────────────────────────────────────────┘

input-field {
    monitor = DP-2
    size = 250, 55
    position = 0, -163
    halign = center
    valign = center

    dots_size = 0.2       # Scale of input-field height (0.2 - 0.8)
    dots_spacing = 0.2    # Scale of dots' absolute size (0.0 - 1.0)
    dots_center = true
    # Input indicator similar to swaylock instead of dots.
    # hide_input = true
    # hide_input_base_color = rgba(0,0,0)
 
    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 2

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color

    placeholder_text =   Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_color = rgba(204, 34, 34, 1.0)
    capslock_color = $color

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

# Lock Icon
label {
    monitor =
    text = <span> </span>
    color = $font_color
#    color = rgba(216, 222, 233, 0.70)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 2, -110
    halign = center
    valign = top
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Date/Clock                                                                │
#  └───────────────────────────────────────────────────────────────────────────┘

# Date (day & month)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%A, %d %B")"
    color = $font_color
    font_size = 30
    font_family = JetBrainsMono Nerd Font

    position = 0, 150
    halign = center
    valign = center
}
# Time
label {
    monitor =
    text = $TIME
    #text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"    
    color = $font_color
    font_size = 140
    font_family = JetBrainsMono Nerd Font

    position = 0, 260
    halign = center
    valign = center
  }

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ User Profile                                                              │
#  └───────────────────────────────────────────────────────────────────────────┘
# Profile photo
image {
    monitor =
    path = $HOME/Pictures/user.jpg
    border_color = rgba(216, 222, 233, 0.70)
    border_size = 3
    size = 160
    rounding = -1        # -1 = circle
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 15
    halign = center
    valign = center
}

# Greeting box
#shape {
#    monitor = DP-2
#    size = 250, 55
#    color = rgba(255, 255, 255, .1)
#    rounding = -1
#    border_size = 4
#    border_color = $outer_color
#    rotate = 0
#    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)
#
#    position = 0, -80
#    halign = center
#    valign = center
#}

# User greeting
label {
    monitor = DP-2
    text =  $USER #ฅᨐฅ                   󰄛 󰭟 󰏒 󰝴
    color = $font_color
    font_size = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, -100
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = false
}

#  ╔═══════════════════════════════════════════════════════════════════════════╗
#  ║  Music Player Widget                                                      ║
#  ╚═══════════════════════════════════════════════════════════════════════════╝
#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Album Art                                                                 │
#  └───────────────────────────────────────────────────────────────────────────┘
image {
    monitor = DP-2
    path = $HOME/.config/hypr/scripts/music.webp
    size = 100
    rounding = 5
    border_size = 3
    border_color = rgba(216, 222, 233, 0.70)
    rotate = 0
    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/hyprlock-music.sh --art
    position = 1045, 57
    halign = left
    valign = bottom
    zindex = 1
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Player Background Box                                                     │
#  └───────────────────────────────────────────────────────────────────────────┘
shape {
    monitor = DP-2
    color = rgba(100, 114, 125, 0.4)
    size = 540, 140
    rounding = 10
    position = 0, 40
    halign = center
    valign = bottom
    zindex = 0
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Track Information                                                         │
#  └───────────────────────────────────────────────────────────────────────────┘

# Song title
label {
    monitor = DP-2
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 55, 138
    halign = center
    valign = bottom
    zindex = 1
}

# Player source (e.g., Spotify, Firefox)
label {
    monitor = DP-2
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --player)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 205, 45
    halign = center
    valign = bottom
    zindex = 1
}

# Artist name
label {
    monitor = DP-2
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/scripts/hyprlock-music.sh --artist)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 55, 118
    halign = center
    valign = bottom
    zindex = 1
}

# Monitor HDMI-A-1
# Song title
label {
    monitor = HDMI-A-1
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -438
    halign = center
    valign = center
    zindex = 1
}

# Artist name
label {
    monitor = HDMI-A-1
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/scripts/hyprlock-music.sh --artist)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -478
    halign = center
    valign = center
    zindex = 1
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Playback Controls                                                         │
#  └───────────────────────────────────────────────────────────────────────────┘
# Previous track button
label {
    monitor = DP-2
    text = 󰒮
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    onclick = playerctl previous
    position = -5, 55
    halign = center
    valign = bottom
}

# Play/Pause button
label {
    monitor = DP-2
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --status
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    onclick = playerctl play-pause
    position = 55, 55
    halign = center
    valign = bottom
}

# Next track button
label {
    monitor = DP-2
    text = 󰒭
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    onclick = playerctl next
    position = 110, 55
    halign = center
    valign = bottom
}

#  ┌───────────────────────────────────────────────────────────────────────────┐
#  │ Progress Display                                                          │
#  └───────────────────────────────────────────────────────────────────────────┘
# Current position timestamp
label {
    monitor = DP-2
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --position)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = -100, 95
    halign = center
    valign = bottom
}

# Total length timestamp
label {
    monitor = DP-2
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --length)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 210, 95
    halign = center
    valign = bottom
}

# Progress bar (with Pango markup for colored segments)
label {
    monitor = DP-2
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --progress-bar
    color = rgba(216, 222, 233, 0.70)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 55, 95
    halign = center
    valign = bottom
}

