# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT CTRL, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT ALT, G, Gimp, exec, omarchy-launch-or-focus ^gimp$ "uwsm-app -- gimp.desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER CTRL, Y, Yazi, exec, omarchy-launch-tui yazi
bindd = SUPER SHIFT CTRL, S, Superfile, exec, omarchy-launch-tui spf
bindd = SUPER SHIFT CTRL, C, Cava, exec, omarchy-launch-or-focus ^cava$ "uwsm-app -- Cava.desktop"
bindd = SUPER SHIFT, Q, Qutebrowser, exec, omarchy-launch-or-focus qutebrowser "uwsm-app -- org.qutebrowser.qutebrowser.desktop"

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, C, Calendar, exec, launch-webapp "https://account.proton.me/calendar"
bindd = SUPER SHIFT, E, Email, exec, launch-webapp "https://account.proton.me/mail"
bindd = SUPER SHIFT, Y, YouTube, exec, launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, G, GitHub, exec, omarchy-launch-or-focus-webapp "GitHub" "https://github.com/"
bindd = SUPER SHIFT, P, Proton, exec, omarchy-launch-or-focus-webapp "Proton" "https://account.proton.me/"
bindd = SUPER SHIFT, X, boot.dev, exec, omarchy-launch-webapp "https://www.boot.dev/"
bindd = SUPER SHIFT ALT, X, FreeCodeCamp, exec, omarchy-launch-webapp "https://www.freecodecamp.org/"
bindd = SUPER CTRL ALT, L, Ljudbok, exec, omarchy-launch-webapp "https://ljudbok.juhlin.io/audiobookshelf/"
bindd = SUPER CTRL ALT, C, Crunchyroll, exec, omarchy-launch-webapp "https://www.crunchyroll.com/"
bindd = SUPER SHIFT ALT, D, Discord, exec, omarchy-launch-webapp "https://www.discord.com/"
bindd = SUPER ALT, Y, YouTube Music, exec, omarchy-launch-webapp "https://music.youtube.com/"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Rebind workspace layout toggle - Dwindle/Scrolling Tiling
unbind = SUPER, L
bindd = SUPER ALT, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Decorations / Aesthetics
bindd = SUPER ALT, BACKSPACE, Toggle inactive windows opacity, exec, toggle-opacity
bindd = SUPER CTRL ALT, BACKSPACE, Toggle inactive windows dimmer, exec, toggle-dim

# Rebind toggle split
unbind = SUPER, J
bindd = SUPER ALT, J, Toggle window split, layoutmsg, togglesplit

# Screensaver
bindd = SUPER SHIFT, S, Screensaver, exec, omarchy-launch-screensaver

# Rebind hyprlock
unbind = SUPER CTRL, L
bindd = SUPER SHIFT, L, Lock system, exec, omarchy-lock-screen

# Move window
bindd = SUPER CTRL, H, Move window left, movewindow, l
bindd = SUPER CTRL, L, Move window right, movewindow, r
bindd = SUPER CTRL, J, Move window down, movewindow, d
bindd = SUPER CTRL, K, Move window up, movewindow, u

# Rebind keybindings-menu
unbind = SUPER, K
bindd = SUPER ALT, K, Show key bindings, exec, omarchy-menu-keybindings

# Vim-style move focus
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d

# Unbind default 'Resize active window'
unbind = SUPER, code:20
unbind = SUPER, code:21
unbind = SUPER SHIFT, code:20
unbind = SUPER SHIFT, code:21

# Resize active window
bindd = SUPER, MINUS, Expand window left, resizeactive, -100 0
bindd = SUPER, PLUS, Shrink window left, resizeactive, 100 0
bindd = SUPER SHIFT, MINUS, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, PLUS, Expand window down, resizeactive, 0 100

