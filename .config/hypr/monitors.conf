# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2

monitor = HDMI-A-1, 3840x2160@60, 0x0, 1.5
monitor = DP-2, 2560x1440@165, 2560x0, 1.0
#monitor = HDMI-A-2, 1920x1080@60, 5120x0, 1.0
# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1


workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1,
workspace = 3, monitor:HDMI-A-1, on-created-empty:uwsm-app -- obsidian -disable-gpu --enable-wayland-ime

workspace = 4, monitor:DP-2, on-created-empty:ghostty, default:true
workspace = 5, monitor:DP-2,
workspace = 6, name:Games, rounding:false, decorate:false, gapsin:0, gapsout:0, border:false, monitor:DP-2, on-created-empty:steam

